  {chapter:"高频英文肌肉", type:"quiz", question:"Tibialis posterior对应的中文名称是什么？", options:["胫前肌","比目鱼肌","胫骨后肌","腓肠肌"], answer:2, explanation:"Tibialis posterior = 胫骨后肌"},
  {chapter:"高频英文肌肉", type:"quiz", question:"Gastrocnemius对应的中文名称是什么？", options:["比目鱼肌","腓肠肌","胫前肌","跖肌"], answer:1, explanation:"Gastrocnemius = 腓肠肌"},
  {chapter:"高频英文肌肉", type:"quiz", question:"Soleus对应的中文名称是什么？", options:["腓肠肌","跖肌","比目鱼肌","胫骨后肌"], answer:2, explanation:"Soleus = 比目鱼肌"},
  {chapter:"高频英文肌肉", type:"quiz", question:"Piriformis对应的中文名称是什么？", options:["髂腰肌","阔筋膜张肌","臀中肌","梨状肌"], answer:3, explanation:"Piriformis = 梨状肌"},
  {chapter:"高频英文肌肉", type:"quiz", question:"Tensor fasciae latae对应的中文名称是什么？", options:["缝匠肌","阔筋膜张肌","股薄肌","髂腰肌"], answer:1, explanation:"Tensor fasciae latae = 阔筋膜张肌"},
  {chapter:"高频英文肌肉", type:"quiz", question:"Gluteus maximus对应的中文名称是什么？", options:["臀中肌","臀小肌","臀大肌","梨状肌"], answer:2, explanation:"Gluteus maximus = 臀大肌"},
  {chapter:"高频英文肌肉", type:"quiz", question:"Gluteus medius对应的中文名称是什么？", options:["臀大肌","臀中肌","臀小肌","阔筋膜张肌"], answer:1, explanation:"Gluteus medius = 臀中肌"},
  {chapter:"高频英文肌肉", type:"quiz", question:"Iliopsoas对应的中文名称是什么？", options:["腰方肌","竖脊肌","髂腰肌","腰大肌"], answer:2, explanation:"Iliopsoas = 髂腰肌"},
];

// ============ STATE ============
let currentMode = 'quiz';
let currentFilter = 'all';
let currentChapter = 'all';
let currentIndex = 0;
let mastered = JSON.parse(localStorage.getItem('anatomy_mastered') || '{}');

// Get chapters
const chapters = [...new Set(RAW_DATA.map(d => d.chapter))];

// Init chapter filter
const chapterSelect = document.getElementById('chapterFilter');
chapters.forEach(ch => {
  const opt = document.createElement('option');
  opt.value = ch;
  opt.textContent = ch;
  chapterSelect.appendChild(opt);
});

function saveMastered() {
  localStorage.setItem('anatomy_mastered', JSON.stringify(mastered));
}

function getFilteredData() {
  return RAW_DATA.filter((item, idx) => {
    const status = mastered[idx];
    if (currentFilter === 'mastered' && status !== 'mastered') return false;
    if (currentFilter === 'unmastered' && status !== 'unmastered') return false;
    if (currentChapter !== 'all' && item.chapter !== currentChapter) return false;
    return true;
  });
}

function getFilteredIndices() {
  const indices = [];
  RAW_DATA.forEach((item, idx) => {
    const status = mastered[idx];
    if (currentFilter === 'mastered' && status !== 'mastered') return;
    if (currentFilter === 'unmastered' && status !== 'unmastered') return;
    if (currentChapter !== 'all' && item.chapter !== currentChapter) return;
    indices.push(idx);
  });
  return indices;
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('modeQuiz').className = mode === 'quiz'
    ? 'px-3 py-1.5 rounded-lg text-sm font-medium transition-all bg-blue-500 text-white'
    : 'px-3 py-1.5 rounded-lg text-sm font-medium transition-all bg-slate-200 text-slate-600';
  document.getElementById('modeRecite').className = mode === 'recite'
    ? 'px-3 py-1.5 rounded-lg text-sm font-medium transition-all bg-blue-500 text-white'
    : 'px-3 py-1.5 rounded-lg text-sm font-medium transition-all bg-slate-200 text-slate-600';
  render();
}

function setFilter(f) {
  currentFilter = f;
  currentIndex = 0;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.className = btn.dataset.filter === f
      ? 'filter-btn filter-active px-3 py-1 rounded-full text-xs font-medium transition-all whitespace-nowrap'
      : 'filter-btn px-3 py-1 rounded-full text-xs font-medium transition-all bg-slate-200 text-slate-600 whitespace-nowrap';
  });
  render();
}

function setChapter(ch) {
  currentChapter = ch;
  currentIndex = 0;
  render();
}

function getChapterColor(chapter) {
  const colors = {
    '第一章 概述': 'bg-blue-100 text-blue-700',
    '第二章 髋关节': 'bg-purple-100 text-purple-700',
    '骨盆与大腿': 'bg-pink-100 text-pink-700',
    '膝关节': 'bg-red-100 text-red-700',
    '踝关节与足': 'bg-orange-100 text-orange-700',
    '肩关节与上臂': 'bg-teal-100 text-teal-700',
    '肘部与前臂': 'bg-cyan-100 text-cyan-700',
    '腕关节与手': 'bg-emerald-100 text-emerald-700',
    '颈部与脊柱': 'bg-indigo-100 text-indigo-700',
    '胸部（呼吸模块）': 'bg-amber-100 text-amber-700',
    '背部与腹部': 'bg-lime-100 text-lime-700',
    '高频英文肌肉': 'bg-violet-100 text-violet-700',
  };
  return colors[chapter] || 'bg-slate-100 text-slate-700';
}

function updateStats() {
  const total = RAW_DATA.length;
  const masteredCount = Object.values(mastered).filter(v => v === 'mastered').length;
  const rate = total > 0 ? Math.round(masteredCount / total * 100) : 0;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statMastered').textContent = masteredCount;
  document.getElementById('statRate').textContent = rate + '%';
}

function updateProgress() {
  const indices = getFilteredIndices();
  const total = indices.length;
  const current = total > 0 ? currentIndex + 1 : 0;
  const masteredInFilter = indices.filter(i => mastered[i] === 'mastered').length;
  const rate = total > 0 ? Math.round(masteredInFilter / total * 100) : 0;
  
  document.getElementById('progressBar').style.width = (total > 0 ? (currentIndex + 1) / total * 100 : 0) + '%';
  document.getElementById('progressText').textContent = `第 ${current}/${total} 个 · 掌握率 ${rate}%`;
  document.getElementById('navIndicator').textContent = `${current} / ${total}`;
}

function renderQuiz(item, originalIdx) {
  const status = mastered[originalIdx];
  const statusClass = status === 'mastered' ? 'border-green-400 bg-green-50/50' : status === 'unmastered' ? 'border-amber-400 bg-amber-50/50' : 'border-slate-200';
  
  let optionsHtml = '';
  if (item.type === 'quiz' && item.options) {
    optionsHtml = `<div class="space-y-2 mt-4" id="options-${originalIdx}">
      ${item.options.map((opt, i) => `
        <button onclick="answerQuiz(${originalIdx}, ${i})" class="option-btn w-full text-left px-4 py-3 rounded-xl border-2 border-slate-200 bg-white hover:border-blue-300 transition-all text-sm" data-idx="${i}">
          <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-slate-100 text-slate-600 text-xs font-bold mr-3">${'ABCD'[i]}</span>${opt}
        </button>
      `).join('')}
    </div>
    <div id="explanation-${originalIdx}" class="hidden mt-4 p-4 rounded-xl bg-blue-50 border border-blue-200 text-sm text-slate-700">
      <div class="font-semibold text-blue-700 mb-1"><i class="fas fa-lightbulb mr-1"></i>解析</div>
      <div>${item.explanation || ''}</div>
    </div>`;
  } else {
    // knowledge item in quiz mode - show as flashcard with question
    optionsHtml = `
      <div class="mt-4">
        <button onclick="revealAnswer(${originalIdx})" id="revealBtn-${originalIdx}" class="w-full py-3 rounded-xl bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-medium text-sm hover:from-blue-600 hover:to-indigo-600 transition-all active:scale-98">
          <i class="fas fa-eye mr-2"></i>查看答案
        </button>
        <div id="answer-${originalIdx}" class="hidden mt-4 p-4 rounded-xl bg-green-50 border border-green-200 text-sm text-slate-700 whitespace-pre-line">
          ${item.answer}
        </div>
      </div>`;
  }

  return `
    <div class="bg-white rounded-2xl shadow-sm border-2 ${statusClass} p-5 card-hover fade-in">
      <div class="flex items-center justify-between mb-3">
        <span class="chapter-tag ${getChapterColor(item.chapter)}">${item.chapter}</span>
        <span class="text-xs text-slate-400">#${originalIdx + 1}</span>
      </div>
      <div class="text-base font-semibold text-slate-800 leading-relaxed">${item.question}</div>
      ${optionsHtml}
      <div class="flex gap-3 mt-5 pt-4 border-t border-slate-100">
        <button onclick="markStatus(${originalIdx}, 'unmastered')" class="btn-mastered flex-1 py-2.5 rounded-xl text-sm font-medium transition-all ${status === 'unmastered' ? 'bg-amber-500 text-white shadow-md' : 'bg-amber-50 text-amber-600 border border-amber-200'}">
          <i class="fas fa-xmark mr-1"></i>未掌握
        </button>
        <button onclick="markStatus(${originalIdx}, 'mastered')" class="btn-mastered flex-1 py-2.5 rounded-xl text-sm font-medium transition-all ${status === 'mastered' ? 'bg-green-500 text-white shadow-md' : 'bg-green-50 text-green-600 border border-green-200'}">
          <i class="fas fa-check mr-1"></i>已掌握
        </button>
      </div>
    </div>`;
}

function renderRecite(item, originalIdx) {
  const status = mastered[originalIdx];
  const statusClass = status === 'mastered' ? 'border-green-400 bg-green-50/50' : status === 'unmastered' ? 'border-amber-400 bg-amber-50/50' : 'border-slate-200';
  
  let content = '';
  if (item.type === 'quiz') {
    // In recite mode, show quiz as knowledge card - directly show answer
    content = `
      <div class="mt-4">
        <div class="p-4 rounded-xl bg-indigo-50 border border-indigo-200 text-sm text-slate-700">
          <div class="font-semibold text-indigo-700 mb-2">选项：</div>
          ${item.options.map((opt, i) => `<div class="py-1 ${i === item.answer ? 'text-green-700 font-bold' : ''}">${i === item.answer ? '✅ ' : ''}${'ABCD'[i]}. ${opt}</div>`).join('')}
          ${item.explanation ? `<div class="mt-3 pt-3 border-t border-indigo-200"><span class="font-semibold text-indigo-700">解析：</span>${item.explanation}</div>` : ''}
        </div>
      </div>`;
  } else {
    content = `
      <div class="mt-4 p-4 rounded-xl bg-green-50 border border-green-200 text-sm text-slate-700 whitespace-pre-line">
        ${item.answer}
      </div>`;
  }

  return `
    <div class="bg-white rounded-2xl shadow-sm border-2 ${statusClass} p-5 card-hover fade-in">
      <div class="flex items-center justify-between mb-3">
        <span class="chapter-tag ${getChapterColor(item.chapter)}">${item.chapter}</span>
        <span class="text-xs text-slate-400">#${originalIdx + 1}</span>
      </div>
      <div class="text-base font-semibold text-slate-800 leading-relaxed">${item.question}</div>
      ${content}
      <div class="flex gap-3 mt-5 pt-4 border-t border-slate-100">
        <button onclick="markStatus(${originalIdx}, 'unmastered')" class="btn-mastered flex-1 py-2.5 rounded-xl text-sm font-medium transition-all ${status === 'unmastered' ? 'bg-amber-500 text-white shadow-md' : 'bg-amber-50 text-amber-600 border border-amber-200'}">
          <i class="fas fa-xmark mr-1"></i>未掌握
        </button>
        <button onclick="markStatus(${originalIdx}, 'mastered')" class="btn-mastered flex-1 py-2.5 rounded-xl text-sm font-medium transition-all ${status === 'mastered' ? 'bg-green-500 text-white shadow-md' : 'bg-green-50 text-green-600 border border-green-200'}">
          <i class="fas fa-check mr-1"></i>已掌握
        </button>
      </div>
    </div>`;
}

function render() {
  const indices = getFilteredIndices();
  const container = document.getElementById('cardContainer');
  const emptyState = document.getElementById('emptyState');
  
  if (indices.length === 0) {
    container.innerHTML = '';
    emptyState.classList.remove('hidden');
    updateProgress();
    updateStats();
    return;
  }
  emptyState.classList.add('hidden');
  
  if (currentIndex >= indices.length) currentIndex = indices.length - 1;
  if (currentIndex < 0) currentIndex = 0;
  
  const originalIdx = indices[currentIndex];
  const item = RAW_DATA[originalIdx];
  
  if (currentMode === 'quiz') {
    container.innerHTML = renderQuiz(item, originalIdx);
  } else {
    container.innerHTML = renderRecite(item, originalIdx);
  }
  
  updateProgress();
  updateStats();
}

function answerQuiz(originalIdx, selected) {
  const item = RAW_DATA[originalIdx];
  const container = document.getElementById(`options-${originalIdx}`);
  if (!container) return;
  
  const buttons = container.querySelectorAll('.option-btn');
  buttons.forEach((btn, i) => {
    btn.classList.add('answered');
    btn.disabled = true;
    if (i === item.answer) btn.classList.add('correct');
    else if (i === selected && i !== item.answer) btn.classList.add('wrong');
  });
  
  const expl = document.getElementById(`explanation-${originalIdx}`);
  if (expl) expl.classList.remove('hidden');
}

function revealAnswer(originalIdx) {
  const el = document.getElementById(`answer-${originalIdx}`);
  const btn = document.getElementById(`revealBtn-${originalIdx}`);
  if (el) el.classList.toggle('hidden');
  if (btn) {
    btn.innerHTML = el.classList.contains('hidden')
      ? '<i class="fas fa-eye mr-2"></i>查看答案'
      : '<i class="fas fa-eye-slash mr-2"></i>隐藏答案';
  }
}

function revealRecite(originalIdx) {
  const el = document.getElementById(`reciteContent-${originalIdx}`);
  const btn = document.getElementById(`revealBtn-${originalIdx}`);
  if (el) el.classList.toggle('hidden');
  if (btn) {
    btn.innerHTML = el.classList.contains('hidden')
      ? '<i class="fas fa-rotate mr-2"></i>翻牌查看'
      : '<i class="fas fa-rotate mr-2"></i>翻回去';
  }
}

function markStatus(originalIdx, status) {
  if (mastered[originalIdx] === status) {
    delete mastered[originalIdx];
  } else {
    mastered[originalIdx] = status;
  }
  saveMastered();
  render();
}

function goNext() {
  const indices = getFilteredIndices();
  if (currentIndex < indices.length - 1) {
    currentIndex++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function goPrev() {
  if (currentIndex > 0) {
    currentIndex--;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goNext();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goPrev();
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 80) {
    if (diff > 0) goNext();
    else goPrev();
  }
});

// Init
render();
</script>
</body>
</html>
